<title>Budget Dashboard</title>
<style>
:root {
  --ground:  #EDE9E1;
  --card:    #FFFFFF;
  --text:    #1A1816;
  --text-2:  #6B6257;
  --border:  #DDD8CF;
  --accent:  #9B7B3F;
  --a-light: #F5EDD8;
  --green:   #4A6B4A;
  --g-light: #EAF2EA;
  --rust:    #7D3F2E;
  --r-light: #F9EAE6;
  --progress:#C4913B;
  --p-done:  #4A6B4A;
  --p-empty: #E2DDD5;
  --radius:  10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--ground);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 28px 56px;
  font-size: 14px;
  line-height: 1.5;
}

/* ── HEADER ── */
.hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.hdr-title { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
.hdr-date  { font-size: 12px; color: var(--text-2); letter-spacing: 0.02em; }

/* ── STATS STRIP ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.stat-cell { background: var(--card); padding: 16px 20px; }
.stat-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-2); margin-bottom: 5px;
}
.stat-value {
  font-size: 26px; font-weight: 600; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums; color: var(--text); line-height: 1;
}
.stat-value.pos { color: var(--green); }
.stat-value.neg { color: var(--rust); }

/* ── GRID ── */
.main-grid   { display: grid; grid-template-columns: 300px 1fr; gap: 16px; margin-bottom: 16px; }
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 22px 22px 20px;
  animation: fadein 0.35s ease both;
}
@keyframes fadein { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.card:nth-of-type(2) { animation-delay: 60ms; }

.card-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 11px; border-bottom: 1px solid var(--border); margin-bottom: 15px;
}
.card-title {
  font-size: 9px; font-weight: 700; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--text-2);
}
.edit-btn {
  font-size: 11px; font-weight: 500; color: var(--text-2);
  background: none; border: 1px solid var(--border); border-radius: 5px;
  padding: 3px 10px; cursor: pointer; font-family: inherit;
  transition: color 0.1s, border-color 0.1s;
}
.edit-btn:hover { color: var(--text); border-color: var(--text-2); }

/* ── CASH FLOW ── */
.cf-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid #F2EEE7; gap: 8px;
}
.cf-row:last-of-type { border-bottom: none; }
.cf-name  { font-size: 13px; color: var(--text-2); flex: 1; }
.cf-amt   { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; white-space: nowrap; }
.cf-amt.neg { color: var(--rust); }
.cf-done-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--green); border: 1px solid var(--green); border-radius: 3px;
  padding: 1px 5px; white-space: nowrap;
}
.cf-row.is-done .cf-name { text-decoration: line-through; opacity: 0.38; }
.cf-row.is-done .cf-amt  { opacity: 0.38; }

.cf-total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-top: 12px; margin-top: 8px; border-top: 1.5px solid var(--text);
}
.cf-total-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text);
}
.cf-total-val {
  font-size: 24px; font-weight: 700; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.cf-sub { font-size: 11px; color: var(--text-2); font-style: italic; text-align: right; margin-top: 3px; }

.cf-links { margin-top: 18px; padding-top: 15px; border-top: 1px solid var(--border); }
.cf-links-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-2); margin-bottom: 8px;
}
.cf-link {
  display: block; font-size: 12px; color: var(--accent);
  text-decoration: underline; text-decoration-color: rgba(155,123,63,0.3);
  margin-bottom: 3px; cursor: pointer;
}
.cf-link:hover { text-decoration-color: var(--accent); }
a.cf-link { }

/* ── BILLS TABLE ── */
.bills-tbl { width: 100%; border-collapse: collapse; }
.bills-tbl th {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-2); text-align: left; padding: 0 8px 9px;
  border-bottom: 1px solid var(--border);
}
.bills-tbl th.r { text-align: right; }
.bills-tbl td {
  padding: 7px 8px; font-size: 13px;
  border-bottom: 1px solid #F2EEE7; vertical-align: middle;
}
.bills-tbl tbody tr:last-child td { border-bottom: none; }
.bills-tbl td.r { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.bills-tbl tfoot td {
  font-weight: 600; border-top: 1px solid var(--border); border-bottom: none;
  padding-top: 10px; font-size: 13px;
}
.type-pill {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
}
.type-manual  { background: var(--a-light); color: var(--accent); }
.type-autopay { background: var(--g-light); color: var(--green); }
.bill-note    { font-size: 10px; color: var(--text-2); font-style: italic; margin-left: 5px; }

/* ── GOALS ── */
.goal-item { margin-bottom: 17px; }
.goal-item:last-child { margin-bottom: 0; }
.goal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.goal-name { font-size: 13px; font-weight: 500; }
.goal-name.done { text-decoration: line-through; opacity: 0.35; }
.goal-pct { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-2); }
.goal-track { height: 5px; background: var(--p-empty); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
.goal-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.85s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}
.fill-done    { background: var(--p-done); }
.fill-partial { background: var(--progress); }
.fill-empty   { background: var(--p-empty); }
.goal-meta {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-2); font-variant-numeric: tabular-nums;
}
.goal-complete { color: var(--green); }

/* ── CALENDAR ── */
.cal-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid #F2EEE7;
}
.cal-row:last-of-type { border-bottom: none; }
.cal-label { font-size: 13px; color: var(--text-2); }
.cal-val   { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
.cal-highlight {
  margin-top: 16px; padding: 16px 18px;
  background: var(--a-light); border-radius: 8px;
  border-left: 3px solid var(--accent);
  display: flex; justify-content: space-between; align-items: center;
}
.cal-highlight.is-neg { background: var(--r-light); border-left-color: var(--rust); }
.cal-hl-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
}
.cal-highlight.is-neg .cal-hl-label { color: var(--rust); }
.cal-hl-val {
  font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums; color: var(--accent);
}
.cal-highlight.is-neg .cal-hl-val { color: var(--rust); }

/* ── EDIT MODE ── */
.e-input {
  border: 1px solid var(--border); border-radius: 5px;
  padding: 4px 8px; font-size: 13px; font-family: inherit;
  background: var(--ground); color: var(--text); width: 100%;
  transition: border-color 0.1s;
}
.e-input:focus { outline: none; border-color: var(--accent); }
.e-select {
  border: 1px solid var(--border); border-radius: 5px;
  padding: 4px 8px; font-size: 12px; font-family: inherit;
  background: var(--ground); color: var(--text); cursor: pointer;
}
.e-select:focus { outline: none; border-color: var(--accent); }
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: none; border: 1px dashed var(--border); border-radius: 6px;
  padding: 7px; font-size: 12px; color: var(--text-2); cursor: pointer;
  width: 100%; margin-top: 8px; font-family: inherit;
  transition: border-color 0.1s, color 0.1s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }
.del-btn {
  background: none; border: none; color: var(--text-2); cursor: pointer;
  font-size: 17px; line-height: 1; padding: 0 4px; opacity: 0.35; font-family: inherit;
  transition: opacity 0.1s;
}
.del-btn:hover { opacity: 1; color: var(--rust); }
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.save-btn {
  background: var(--accent); color: white; border: none;
  border-radius: 6px; padding: 7px 18px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: opacity 0.1s;
}
.save-btn:hover { opacity: 0.84; }
.cancel-btn {
  background: none; color: var(--text-2); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 16px; font-size: 12px;
  cursor: pointer; font-family: inherit; transition: border-color 0.1s;
}
.cancel-btn:hover { border-color: var(--text-2); color: var(--text); }
.done-toggle {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 7px; border-radius: 3px; border: 1px solid; cursor: pointer;
  white-space: nowrap; font-family: inherit; background: none;
  transition: all 0.1s;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .main-grid   { grid-template-columns: 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  .stats-row   { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  .card, .goal-fill { animation: none; transition: none; }
}
</style>

<header class="hdr">
  <div class="hdr-title">Budget Dashboard</div>
  <div class="hdr-date" id="hdr-date"></div>
</header>

<div class="stats-row">
  <div class="stat-cell">
    <div class="stat-label">Monthly Bills</div>
    <div class="stat-value" id="stat-bills">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Goals Complete</div>
    <div class="stat-value" id="stat-goals">—</div>
  </div>
  <div class="stat-cell">
    <div class="stat-label">Year Remaining</div>
    <div class="stat-value" id="stat-year">—</div>
  </div>
</div>

<div class="main-grid">
  <div class="card" id="cf-card"></div>
  <div class="card" id="bills-card"></div>
</div>
<div class="bottom-grid">
  <div class="card" id="goals-card"></div>
  <div class="card" id="cal-card"></div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const KEY = 'bdgt-v3';

const DEFAULTS = {
  cashFlow: [
    {id:1,name:'Current Checking',value:9528,done:false},
    {id:2,name:'Checking Buffer',value:-200,done:false},
    {id:3,name:'Rent',value:-2361,done:false},
    {id:4,name:'Rent Reimbursement',value:1180.50,done:false},
    {id:5,name:'Discover',value:-3895,done:true},
    {id:6,name:'Savor',value:-1306,done:true},
  ],
  bills: [
    {id:1, name:'Rent',            account:'CapOne Checking',        type:'Manual',  avgCost:1169, note:''},
    {id:2, name:'Gym',             account:'Discover',               type:'Autopay', avgCost:22,   note:'Paid annually'},
    {id:3, name:'Spotify',         account:'Discover',               type:'Autopay', avgCost:14,   note:''},
    {id:4, name:'Tolls',           account:'Discover',               type:'Autopay', avgCost:80,   note:''},
    {id:5, name:'Invisalign',      account:'Discover',               type:'Autopay', avgCost:178,  note:''},
    {id:6, name:'Auto Insurance',  account:'Discover',               type:'Autopay', avgCost:175,  note:''},
    {id:7, name:'Med refills',     account:'Discover',               type:'Autopay', avgCost:4,    note:''},
    {id:8, name:'Phone Bill',      account:'Prosperity Checking',    type:'Autopay', avgCost:35,   note:''},
    {id:9, name:'Electric',        account:'Zelle (CapOne Checking)',type:'Manual',  avgCost:35,   note:''},
    {id:10,name:'Internet',        account:'Zelle (CapOne Checking)',type:'Manual',  avgCost:45,   note:''},
    {id:11,name:'Groceries/Dining',account:'Zelle/Savor',            type:'Manual',  avgCost:500,  note:''},
    {id:12,name:'Gas',             account:'Discover',               type:'Manual',  avgCost:150,  note:''},
  ],
  goals: [
    {id:1,name:'2025 Roth',       current:7500, goal:7500,  completed:true},
    {id:2,name:'Car Fund',        current:2000, goal:2000,  completed:true},
    {id:3,name:'Roth 2026',       current:7500, goal:7500,  completed:false},
    {id:4,name:'Enriched E. Fund',current:0,    goal:10000, completed:false},
    {id:5,name:'Travel Fund',     current:0,    goal:6500,  completed:false},
  ],
  calendar: {
    nextPayroll: '2026-07-02',
    numPaychecks: 13,
    netIncomePerCheck: 2636,
    expectedExpenses: 16846,
  },
  links: [
    {id:1,name:'Retirement Calc',       url:''},
    {id:2,name:'Prime Directive',       url:''},
    {id:3,name:'Coast FIRE Calc',       url:''},
    {id:4,name:'Compound Interest Calc',url:''},
  ],
};

let D = (() => {
  try { const s = localStorage.getItem(KEY); return s ? JSON.parse(s) : clone(DEFAULTS); }
  catch { return clone(DEFAULTS); }
})();

const editing = {cf: false, bills: false, goals: false, cal: false};

function clone(x) { return JSON.parse(JSON.stringify(x)); }
function save()   { localStorage.setItem(KEY, JSON.stringify(D)); }
function reload() { try { const s = localStorage.getItem(KEY); D = s ? JSON.parse(s) : clone(DEFAULTS); } catch { D = clone(DEFAULTS); } }
function nextId(arr) { return arr.reduce((m,i) => Math.max(m,i.id),0) + 1; }

function fmt(n) {
  const v = parseFloat(n) || 0;
  return '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:2});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  try { const [y,m,d] = iso.split('-'); return `${parseInt(m)}/${parseInt(d)}/${y}`; }
  catch { return iso; }
}

// ── STATS ────────────────────────────────────────────────────────────────────

function updateStats() {
  const billsTotal = D.bills.reduce((s,b) => s + (parseFloat(b.avgCost)||0), 0);
  const goalsTotal = D.goals.length;
  const goalsDone  = D.goals.filter(g => (parseFloat(g.goal)||0) > 0 && (parseFloat(g.current)||0) >= (parseFloat(g.goal)||0)).length;
  const cal = D.calendar;
  const netIncome = (parseFloat(cal.numPaychecks)||0) * (parseFloat(cal.netIncomePerCheck)||0);
  const yearRem   = netIncome - (parseFloat(cal.expectedExpenses)||0);

  document.getElementById('stat-bills').textContent = fmt(billsTotal);
  const goalsEl = document.getElementById('stat-goals');
  goalsEl.textContent = goalsDone + ' / ' + goalsTotal;
  const yearEl = document.getElementById('stat-year');
  yearEl.textContent = (yearRem < 0 ? '−' : '') + fmt(yearRem);
  yearEl.className = 'stat-value ' + (yearRem < 0 ? 'neg' : 'pos');
}

// ── CASH FLOW ────────────────────────────────────────────────────────────────

function renderCF() {
  const el = document.getElementById('cf-card');
  if (!el) return;
  const total = D.cashFlow.reduce((s,i) => s + (parseFloat(i.value)||0), 0);
  const reimbItem = D.cashFlow.find(i => /reimb/i.test(i.name));
  const reimbVal  = reimbItem ? parseFloat(reimbItem.value)||0 : 0;
  const noReim    = total - reimbVal;

  if (editing.cf) {
    el.innerHTML = `
      <div class="card-hdr"><span class="card-title">True Cash Flow</span></div>
      <div id="cf-rows">
        ${D.cashFlow.map(item => {
          const doneStyle = item.done
            ? `color:var(--green);border-color:var(--green);`
            : `color:var(--text-2);border-color:var(--border);`;
          return `
          <div style="display:grid;grid-template-columns:1fr 100px auto auto;gap:6px;align-items:center;margin-bottom:6px;" data-cf-id="${item.id}">
            <input class="e-input" data-f="name"  value="${esc(item.name)}"  placeholder="Account">
            <input class="e-input" type="number" data-f="value" value="${item.value}" style="text-align:right">
            <button class="done-toggle" style="${doneStyle}" onclick="cfToggleDone(${item.id})">
              ${item.done ? 'Done ✓' : 'Mark done'}
            </button>
            <button class="del-btn" onclick="cfDelete(${item.id})">×</button>
          </div>`;
        }).join('')}
      </div>
      <button class="add-btn" onclick="cfAdd()">+ Add row</button>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <div class="cf-links-label">Calculator Links</div>
        <div id="cf-link-rows">
          ${D.links.map(lk => `
          <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:6px;margin-bottom:6px;" data-lk-id="${lk.id}">
            <input class="e-input" data-lf="name" value="${esc(lk.name)}" placeholder="Label">
            <input class="e-input" data-lf="url"  value="${esc(lk.url)}"  placeholder="URL (optional)">
          </div>`).join('')}
        </div>
      </div>

      <div class="btn-row">
        <button class="cancel-btn" onclick="cfCancel()">Cancel</button>
        <button class="save-btn"   onclick="cfSave()">Save</button>
      </div>`;
  } else {
    const linksHTML = D.links.filter(l=>l.name).map(l =>
      l.url
        ? `<a href="${esc(l.url)}" class="cf-link" target="_blank" rel="noopener">${esc(l.name)}</a>`
        : `<span class="cf-link" style="opacity:.45;text-decoration:none;cursor:default">${esc(l.name)}</span>`
    ).join('');

    el.innerHTML = `
      <div class="card-hdr">
        <span class="card-title">True Cash Flow</span>
        <button class="edit-btn" onclick="cfEdit()">Edit</button>
      </div>
      ${D.cashFlow.map(item => {
        const v   = parseFloat(item.value)||0;
        const neg = v < 0;
        return `
        <div class="cf-row ${item.done?'is-done':''}">
          <span class="cf-name">${esc(item.name)}</span>
          <span style="display:flex;align-items:center;gap:6px;">
            <span class="cf-amt ${neg?'neg':''}">${neg?'−':''}${fmt(item.value)}</span>
            ${item.done ? '<span class="cf-done-badge">Done</span>' : ''}
          </span>
        </div>`;
      }).join('')}
      <div class="cf-total-row">
        <span class="cf-total-label">Total Remaining</span>
        <span class="cf-total-val ${total<0?'neg':''}">${total<0?'−':''}${fmt(total)}</span>
      </div>
      ${reimbVal!==0 ? `<div class="cf-sub">excl. ${esc(reimbItem.name)}: ${noReim<0?'−':''}${fmt(noReim)}</div>` : ''}
      ${linksHTML ? `<div class="cf-links"><div class="cf-links-label">Calculators</div>${linksHTML}</div>` : ''}`;
  }
}

function cfEdit() { editing.cf = true; renderCF(); }
function cfCancel() { reload(); editing.cf = false; renderCF(); }

function cfSyncEdits() {
  document.querySelectorAll('#cf-rows [data-cf-id]').forEach(row => {
    const id   = parseInt(row.dataset.cfId);
    const item = D.cashFlow.find(i=>i.id===id);
    if (!item) return;
    const n = row.querySelector('[data-f="name"]');
    const v = row.querySelector('[data-f="value"]');
    if (n) item.name  = n.value;
    if (v) item.value = parseFloat(v.value)||0;
  });
  document.querySelectorAll('#cf-link-rows [data-lk-id]').forEach(row => {
    const id = parseInt(row.dataset.lkId);
    const lk = D.links.find(l=>l.id===id);
    if (!lk) return;
    const n = row.querySelector('[data-lf="name"]');
    const u = row.querySelector('[data-lf="url"]');
    if (n) lk.name = n.value;
    if (u) lk.url  = u.value;
  });
}

function cfSave() { cfSyncEdits(); save(); editing.cf = false; renderAll(); }

function cfToggleDone(id) {
  cfSyncEdits();
  const item = D.cashFlow.find(i=>i.id===id);
  if (item) item.done = !item.done;
  renderCF();
}
function cfDelete(id) {
  cfSyncEdits();
  D.cashFlow = D.cashFlow.filter(i=>i.id!==id);
  renderCF();
}
function cfAdd() {
  cfSyncEdits();
  D.cashFlow.push({id:nextId(D.cashFlow),name:'',value:0,done:false});
  renderCF();
}

// ── BILLS ────────────────────────────────────────────────────────────────────

function renderBills() {
  const el = document.getElementById('bills-card');
  if (!el) return;
  const total = D.bills.reduce((s,b)=>s+(parseFloat(b.avgCost)||0),0);

  if (editing.bills) {
    el.innerHTML = `
      <div class="card-hdr"><span class="card-title">Monthly Bills</span></div>
      <div style="overflow-x:auto;">
        <table class="bills-tbl">
          <thead>
            <tr>
              <th>Name</th><th>Account</th><th>Type</th>
              <th class="r">Avg Cost</th><th>Note</th><th></th>
            </tr>
          </thead>
          <tbody id="bills-rows">
            ${D.bills.map(b=>`
            <tr data-bill-id="${b.id}">
              <td><input class="e-input" data-f="name"    value="${esc(b.name)}"    placeholder="Bill name"></td>
              <td><input class="e-input" data-f="account" value="${esc(b.account)}" placeholder="Account"></td>
              <td>
                <select class="e-select" data-f="type">
                  <option value="Manual"  ${b.type==='Manual' ?'selected':''}>Manual</option>
                  <option value="Autopay" ${b.type==='Autopay'?'selected':''}>Autopay</option>
                </select>
              </td>
              <td><input class="e-input" type="number" data-f="avgCost" value="${b.avgCost}" style="text-align:right;width:80px"></td>
              <td><input class="e-input" data-f="note" value="${esc(b.note||'')}" placeholder="e.g. Paid annually" style="font-size:11px"></td>
              <td><button class="del-btn" onclick="billDelete(${b.id})">×</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <button class="add-btn" onclick="billAdd()">+ Add bill</button>
      <div class="btn-row">
        <button class="cancel-btn" onclick="billCancel()">Cancel</button>
        <button class="save-btn"   onclick="billSave()">Save</button>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="card-hdr">
        <span class="card-title">Monthly Bills</span>
        <button class="edit-btn" onclick="billEdit()">Edit</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="bills-tbl">
          <thead>
            <tr>
              <th>Name</th><th>Account</th><th>Type</th><th class="r">Average Cost</th>
            </tr>
          </thead>
          <tbody>
            ${D.bills.map(b=>`
            <tr>
              <td>${esc(b.name)}</td>
              <td style="color:var(--text-2);font-size:12px">${esc(b.account)}</td>
              <td><span class="type-pill type-${b.type.toLowerCase()}">${esc(b.type)}</span></td>
              <td class="r">${fmt(b.avgCost)}${b.note?`<span class="bill-note">${esc(b.note)}</span>`:''}</td>
            </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3"><strong>Total</strong></td>
              <td class="r"><strong>${fmt(total)}</strong></td>
            </tr>
          </tfoot>
        </table>
      </div>`;
  }
}

function billEdit()   { editing.bills = true; renderBills(); }
function billCancel() { reload(); editing.bills = false; renderBills(); }

function billSyncEdits() {
  document.querySelectorAll('#bills-rows tr[data-bill-id]').forEach(row => {
    const id   = parseInt(row.dataset.billId);
    const bill = D.bills.find(b=>b.id===id);
    if (!bill) return;
    row.querySelectorAll('[data-f]').forEach(el => {
      const f = el.dataset.f;
      bill[f] = f==='avgCost' ? (parseFloat(el.value)||0) : el.value;
    });
  });
}
function billSave()   { billSyncEdits(); save(); editing.bills = false; renderAll(); }
function billDelete(id) {
  billSyncEdits();
  D.bills = D.bills.filter(b=>b.id!==id);
  renderBills();
}
function billAdd() {
  billSyncEdits();
  D.bills.push({id:nextId(D.bills),name:'',account:'',type:'Manual',avgCost:0,note:''});
  renderBills();
}

// ── GOALS ────────────────────────────────────────────────────────────────────

function renderGoals() {
  const el = document.getElementById('goals-card');
  if (!el) return;

  if (editing.goals) {
    el.innerHTML = `
      <div class="card-hdr"><span class="card-title">Prime Directive — Goals</span></div>
      <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);
                  display:grid;grid-template-columns:1fr 90px 90px auto auto;gap:6px;margin-bottom:6px;padding:0 2px;">
        <span>Goal</span><span style="text-align:right">Current</span>
        <span style="text-align:right">Target</span><span></span><span></span>
      </div>
      <div id="goals-rows">
        ${D.goals.map(g=>`
        <div data-goal-id="${g.id}"
             style="display:grid;grid-template-columns:1fr 90px 90px auto auto;gap:6px;align-items:center;margin-bottom:8px;">
          <input class="e-input" data-f="name"    value="${esc(g.name)}" placeholder="Goal name">
          <input class="e-input" type="number" data-f="current" value="${g.current}" style="text-align:right">
          <input class="e-input" type="number" data-f="goal"    value="${g.goal}"    style="text-align:right">
          <label style="font-size:11px;color:var(--text-2);white-space:nowrap;cursor:pointer;
                        display:flex;align-items:center;gap:4px;">
            <input type="checkbox" data-f="completed" ${g.completed?'checked':''}> Done
          </label>
          <button class="del-btn" onclick="goalDelete(${g.id})">×</button>
        </div>`).join('')}
      </div>
      <button class="add-btn" onclick="goalAdd()">+ Add goal</button>
      <div class="btn-row">
        <button class="cancel-btn" onclick="goalCancel()">Cancel</button>
        <button class="save-btn"   onclick="goalSave()">Save</button>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="card-hdr">
        <span class="card-title">Prime Directive — Goals</span>
        <button class="edit-btn" onclick="goalEdit()">Edit</button>
      </div>
      ${D.goals.map(g => {
        const curr = parseFloat(g.current)||0;
        const tgt  = parseFloat(g.goal)||0;
        const pct  = tgt > 0 ? Math.min(100, Math.round(curr/tgt*100)) : 0;
        const rem  = Math.max(0, tgt - curr);
        const isDone = pct >= 100;
        const fillCls = isDone ? 'fill-done' : (pct > 0 ? 'fill-partial' : 'fill-empty');
        return `
        <div class="goal-item">
          <div class="goal-hdr">
            <span class="goal-name ${g.completed?'done':''}">${esc(g.name)}</span>
            <span class="goal-pct">${pct}%</span>
          </div>
          <div class="goal-track">
            <div class="goal-fill ${fillCls}" style="width:0%" data-target="${pct}"></div>
          </div>
          <div class="goal-meta">
            <span>${fmt(curr)} / ${fmt(tgt)}</span>
            ${rem > 0
              ? `<span>${fmt(rem)} remaining</span>`
              : '<span class="goal-complete">Complete</span>'}
          </div>
        </div>`;
      }).join('')}`;

    requestAnimationFrame(() => {
      document.querySelectorAll('.goal-fill[data-target]').forEach(bar => {
        requestAnimationFrame(() => { bar.style.width = bar.dataset.target + '%'; });
      });
    });
  }
}

function goalEdit()   { editing.goals = true; renderGoals(); }
function goalCancel() { reload(); editing.goals = false; renderGoals(); }

function goalSyncEdits() {
  document.querySelectorAll('#goals-rows [data-goal-id]').forEach(row => {
    const id = parseInt(row.dataset.goalId);
    const g  = D.goals.find(g=>g.id===id);
    if (!g) return;
    row.querySelectorAll('[data-f]').forEach(el => {
      const f = el.dataset.f;
      if      (f==='completed')         g[f] = el.checked;
      else if (f==='current'||f==='goal') g[f] = parseFloat(el.value)||0;
      else                               g[f] = el.value;
    });
  });
}
function goalSave()   { goalSyncEdits(); save(); editing.goals = false; renderAll(); }
function goalDelete(id) {
  goalSyncEdits();
  D.goals = D.goals.filter(g=>g.id!==id);
  renderGoals();
}
function goalAdd() {
  goalSyncEdits();
  D.goals.push({id:nextId(D.goals),name:'',current:0,goal:0,completed:false});
  renderGoals();
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────

function renderCal() {
  const el = document.getElementById('cal-card');
  if (!el) return;
  const cal = D.calendar;
  const netIncome = (parseFloat(cal.numPaychecks)||0) * (parseFloat(cal.netIncomePerCheck)||0);
  const yearRem   = netIncome - (parseFloat(cal.expectedExpenses)||0);

  if (editing.cal) {
    el.innerHTML = `
      <div class="card-hdr"><span class="card-title">Calendar Year — Income</span></div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${[
          ['Next Payroll',       'date',   'nextPayroll',       cal.nextPayroll,       '160px'],
          ['# of Paychecks',    'number', 'numPaychecks',      cal.numPaychecks,      '90px'],
          ['Net Income / Check','number', 'netIncomePerCheck', cal.netIncomePerCheck, '120px'],
          ['Expected Expenses', 'number', 'expectedExpenses',  cal.expectedExpenses,  '120px'],
        ].map(([label,type,id,val,w])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <label style="font-size:13px;color:var(--text-2);white-space:nowrap">${label}</label>
          <input class="e-input" type="${type}" id="cal-${id}" value="${esc(val)}" style="width:${w};text-align:right">
        </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="cancel-btn" onclick="calCancel()">Cancel</button>
        <button class="save-btn"   onclick="calSave()">Save</button>
      </div>`;
  } else {
    const isNeg = yearRem < 0;
    el.innerHTML = `
      <div class="card-hdr">
        <span class="card-title">Calendar Year — Income</span>
        <button class="edit-btn" onclick="calEdit()">Edit</button>
      </div>
      <div class="cal-row">
        <span class="cal-label">Next Payroll</span>
        <span class="cal-val">${esc(fmtDate(cal.nextPayroll))}</span>
      </div>
      <div class="cal-row">
        <span class="cal-label"># of Paychecks</span>
        <span class="cal-val">${cal.numPaychecks}</span>
      </div>
      <div class="cal-row">
        <span class="cal-label">Net Income</span>
        <span class="cal-val">${fmt(netIncome)}</span>
      </div>
      <div class="cal-row">
        <span class="cal-label">Expected Expenses</span>
        <span class="cal-val">${fmt(cal.expectedExpenses)}</span>
      </div>
      <div class="cal-highlight ${isNeg?'is-neg':''}">
        <span class="cal-hl-label">Remaining</span>
        <span class="cal-hl-val">${isNeg?'−':''}${fmt(yearRem)}</span>
      </div>`;
  }
}

function calEdit()   { editing.cal = true; renderCal(); }
function calCancel() { reload(); editing.cal = false; renderCal(); }
function calSave() {
  D.calendar.nextPayroll       = document.getElementById('cal-nextPayroll').value;
  D.calendar.numPaychecks      = parseFloat(document.getElementById('cal-numPaychecks').value)||0;
  D.calendar.netIncomePerCheck = parseFloat(document.getElementById('cal-netIncomePerCheck').value)||0;
  D.calendar.expectedExpenses  = parseFloat(document.getElementById('cal-expectedExpenses').value)||0;
  save(); editing.cal = false; renderAll();
}

// ── INIT ─────────────────────────────────────────────────────────────────────

function renderAll() {
  renderCF(); renderBills(); renderGoals(); renderCal(); updateStats();
}

document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

renderAll();
</script>
